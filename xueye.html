<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学业运势 - 天道元一</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #f0f0f0;
        }
        .container { max-width: 480px; margin: 0 auto; padding: 20px; padding-bottom: 100px; }
        .header { text-align: center; padding: 30px 0; border-bottom: 1px solid rgba(255, 215, 0, 0.2); margin-bottom: 20px; }
        .header h1 { font-size: 32px; color: #FFD700; text-shadow: 0 0 20px rgba(255, 215, 0, 0.3); margin-bottom: 10px; }
        .header p { color: #888; font-size: 16px; }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        .card-title { font-size: 20px; color: #FFD700; margin-bottom: 20px; text-align: center; font-weight: bold; }
        .form-item { margin-bottom: 20px; }
        .form-label { display: block; color: #FFD700; margin-bottom: 10px; font-size: 16px; }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            padding: 15px;
            color: #f0f0f0;
            font-size: 16px;
        }
        .form-textarea { min-height: 100px; resize: vertical; }
        .datetime-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-secondary {
            width: 100%;
            background: transparent;
            border: 2px solid #FFD700;
            color: #FFD700;
            padding: 15px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        .loading { text-align: center; padding: 50px; }
        .loading-spinner {
            width: 60px; height: 60px;
            border: 4px solid rgba(255, 215, 0, 0.3);
            border-top-color: #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        
        .score-display {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(100, 149, 237, 0.1));
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            margin-bottom: 20px;
        }
        .score-circle {
            width: 150px; height: 150px;
            border-radius: 50%;
            background: conic-gradient(#FFD700 var(--score), rgba(255,255,255,0.1) 0);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            position: relative;
        }
        .score-circle::before {
            content: ''; position: absolute;
            width: 120px; height: 120px;
            background: #0a0a0f;
            border-radius: 50%;
        }
        .score-number {
            position: relative; z-index: 1;
            font-size: 48px; color: #FFD700; font-weight: bold;
        }
        .score-label { color: #888; font-size: 16px; }
        
        .subject-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .subject-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .subject-icon { font-size: 32px; margin-bottom: 10px; }
        .subject-name { color: #f0f0f0; font-size: 14px; margin-bottom: 8px; }
        .subject-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 5px;
        }
        .subject-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FFA500);
            border-radius: 4px;
        }
        .subject-score { color: #FFD700; font-size: 14px; font-weight: bold; }
        
        .exam-countdown {
            background: rgba(255, 215, 0, 0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .countdown-title { color: #FFD700; font-size: 16px; margin-bottom: 15px; }
        .countdown-grid {
            display: flex; justify-content: center; gap: 15px;
        }
        .countdown-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            min-width: 60px;
        }
        .countdown-value { font-size: 28px; color: #FFD700; font-weight: bold; }
        .countdown-label { font-size: 12px; color: #888; margin-top: 5px; }
        
        .analysis-card {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #FFD700;
            border-radius: 0 12px 12px 0;
            padding: 20px;
            margin-bottom: 15px;
        }
        .analysis-title { color: #FFD700; font-size: 16px; font-weight: bold; margin-bottom: 10px; }
        .analysis-content { color: #f0f0f0; font-size: 14px; line-height: 1.8; }
        
        .tips-list { list-style: none; }
        .tips-item {
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: flex-start; gap: 10px;
        }
        .tips-item:last-child { border-bottom: none; }
        .tips-icon { color: #FFD700; font-size: 18px; flex-shrink: 0; }
        .tips-text { color: #f0f0f0; font-size: 14px; line-height: 1.6; }
        
        .lucky-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .lucky-item {
            background: rgba(255, 215, 0, 0.1);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        .lucky-icon { font-size: 28px; margin-bottom: 8px; }
        .lucky-label { color: #888; font-size: 12px; }
        .lucky-value { color: #FFD700; font-size: 14px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 学业运势</h1>
            <p>考试运势分析、文昌位指引、学习建议</p>
        </div>

        <div id="inputSection">
            <div class="card">
                <div class="card-title">请输入信息</div>
                <div class="form-item">
                    <label class="form-label">出生日期</label>
                    <div class="datetime-row">
                        <select class="form-select" id="birthYear"></select>
                        <select class="form-select" id="birthMonth"></select>
                        <select class="form-select" id="birthDay"></select>
                    </div>
                </div>
                <div class="form-item">
                    <label class="form-label">当前学历</label>
                    <select class="form-select" id="education">
                        <option value="primary">小学</option>
                        <option value="middle">初中</option>
                        <option value="high" selected>高中</option>
                        <option value="college">大学</option>
                        <option value="graduate">研究生</option>
                    </select>
                </div>
                <div class="form-item">
                    <label class="form-label">即将参加的考试</label>
                    <input type="text" class="form-input" id="examName" placeholder="如：高考、中考、期末考试">
                </div>
                <div class="form-item">
                    <label class="form-label">考试日期</label>
                    <input type="date" class="form-input" id="examDate">
                </div>
                <button class="btn-primary" onclick="analyze()">分析学业运势</button>
            </div>
        </div>

        <div id="loadingSection" class="loading hidden">
            <div class="loading-spinner"></div>
            <div style="color: #FFD700;">正在分析学业运势...</div>
        </div>

        <div id="resultSection" class="hidden">
            <div class="score-display">
                <div class="score-circle" id="scoreCircle" style="--score: 0%;">
                    <div class="score-number" id="scoreNumber">0</div>
                </div>
                <div class="score-label">学业运势指数</div>
            </div>

            <div class="exam-countdown" id="examCountdown">
                <div class="countdown-title">⏰ 距离考试还有</div>
                <div class="countdown-grid">
                    <div class="countdown-item">
                        <div class="countdown-value" id="days">0</div>
                        <div class="countdown-label">天</div>
                    </div>
                    <div class="countdown-item">
                        <div class="countdown-value" id="hours">0</div>
                        <div class="countdown-label">时</div>
                    </div>
                    <div class="countdown-item">
                        <div class="countdown-value" id="minutes">0</div>
                        <div class="countdown-label">分</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">📊 各科运势</div>
                <div class="subject-grid" id="subjectGrid">
                    <!-- 动态生成 -->
                </div>
            </div>

            <div class="card">
                <div class="card-title">🍀 开运指南</div>
                <div class="lucky-section">
                    <div class="lucky-item">
                        <div class="lucky-icon" id="luckyColorIcon">🔴</div>
                        <div class="lucky-label">幸运色</div>
                        <div class="lucky-value" id="luckyColor">红色</div>
                    </div>
                    <div class="lucky-item">
                        <div class="lucky-icon" id="luckyNumberIcon">8️⃣</div>
                        <div class="lucky-label">幸运数字</div>
                        <div class="lucky-value" id="luckyNumber">8</div>
                    </div>
                    <div class="lucky-item">
                        <div class="lucky-icon" id="luckyDirectionIcon">📍</div>
                        <div class="lucky-label">文昌位</div>
                        <div class="lucky-value" id="luckyDirection">东南</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">🔮 运势分析</div>
                <div class="analysis-card">
                    <div class="analysis-title">整体运势</div>
                    <div class="analysis-content" id="overallAnalysis">
                        当前学业运势良好，文昌星入命，利于考试发挥。
                    </div>
                </div>
                <div class="analysis-card">
                    <div class="analysis-title">考试发挥</div>
                    <div class="analysis-content" id="examAnalysis">
                        考试当天状态不错，保持平常心即可取得好成绩。
                    </div>
                </div>
                <div class="analysis-card">
                    <div class="analysis-title">学习建议</div>
                    <div class="analysis-content" id="studyAdvice">
                        建议制定详细复习计划，重点突破薄弱环节。
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">💡 备考建议</div>
                <ul class="tips-list" id="tipsList">
                    <!-- 动态生成 -->
                </ul>
            </div>

            <button class="btn-secondary" onclick="reset()">重新分析</button>
        </div>
    </div>

    <script>
        function initDateSelects() {
            const currentYear = new Date().getFullYear();
            const yearSel = document.getElementById('birthYear');
            for (let i = currentYear - 10; i >= currentYear - 30; i--) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = i + '年';
                yearSel.appendChild(opt);
            }
            yearSel.value = currentYear - 18;

            ['Month', 'Day'].forEach(type => {
                const sel = document.getElementById('birth' + type);
                const max = type === 'Month' ? 12 : 31;
                for (let i = 1; i <= max; i++) {
                    const opt = document.createElement('option');
                    opt.value = i;
                    opt.textContent = i + (type === 'Month' ? '月' : '日');
                    sel.appendChild(opt);
                }
                sel.value = type === 'Month' ? 6 : 15;
            });

            // 默认考试日期为3个月后
            const examDate = new Date();
            examDate.setMonth(examDate.getMonth() + 3);
            document.getElementById('examDate').value = examDate.toISOString().split('T')[0];
        }
        initDateSelects();

        function analyze() {
            document.getElementById('inputSection').classList.add('hidden');
            document.getElementById('loadingSection').classList.remove('hidden');
            setTimeout(showResult, 1500);
        }

        function showResult() {
            const examDate = new Date(document.getElementById('examDate').value);
            const now = new Date();
            const diff = examDate - now;
            
            // 倒计时
            if (diff > 0) {
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById('days').textContent = days;
                document.getElementById('hours').textContent = hours;
                document.getElementById('minutes').textContent = minutes;
            }

            // 运势分数
            const score = Math.floor(Math.random() * 25) + 70;
            document.getElementById('scoreNumber').textContent = score;
            document.getElementById('scoreCircle').style.setProperty('--score', score + '%');

            // 各科运势
            const subjects = [
                { name: '语文', icon: '📖' },
                { name: '数学', icon: '🔢' },
                { name: '英语', icon: '🔤' },
                { name: '综合', icon: '📚' }
            ];
            
            document.getElementById('subjectGrid').innerHTML = subjects.map(s => {
                const sScore = Math.floor(Math.random() * 30) + 65;
                return `
                    <div class="subject-item">
                        <div class="subject-icon">${s.icon}</div>
                        <div class="subject-name">${s.name}</div>
                        <div class="subject-bar">
                            <div class="subject-fill" style="width: ${sScore}%"></div>
                        </div>
                        <div class="subject-score">${sScore}分</div>
                    </div>
                `;
            }).join('');

            // 开运指南
            const colors = [
                { name: '红色', icon: '🔴', desc: '旺文昌' },
                { name: '绿色', icon: '🟢', desc: '利思考' },
                { name: '蓝色', icon: '🔵', desc: '助记忆' },
                { name: '黄色', icon: '🟡', desc: '增自信' },
                { name: '紫色', icon: '🟣', desc: '开智慧' }
            ];
            const color = colors[Math.floor(Math.random() * colors.length)];
            document.getElementById('luckyColor').textContent = color.name;
            document.getElementById('luckyColorIcon').textContent = color.icon;
            
            const numbers = [3, 6, 8, 9, 11, 16, 18, 21, 28];
            document.getElementById('luckyNumber').textContent = numbers[Math.floor(Math.random() * numbers.length)];
            
            const directions = ['东', '南', '西', '北', '东南', '东北', '西南', '西北'];
            document.getElementById('luckyDirection').textContent = directions[Math.floor(Math.random() * directions.length)];

            // 分析内容
            const analyses = [
                score >= 85 ? '当前学业运势极佳，文昌星高照，考试发挥出色，有望取得理想成绩。' :
                score >= 75 ? '学业运势良好，只要保持努力，考试定能取得不错的成绩。' :
                '学业运势平稳，需要付出更多努力，注意调整学习方法。',
                
                score >= 80 ? '考试当天状态上佳，思维敏捷，答题顺利，容易超常发挥。' :
                '考试状态尚可，保持平常心，认真审题，发挥正常水平即可。',
                
                '建议制定详细复习计划，重点突破薄弱环节。每天保证充足睡眠，劳逸结合。'
            ];
            
            document.getElementById('overallAnalysis').textContent = analyses[0];
            document.getElementById('examAnalysis').textContent = analyses[1];
            document.getElementById('studyAdvice').textContent = analyses[2];

            // 备考建议
            const tips = [
                { icon: '📅', text: '制定详细复习计划，合理分配各科时间' },
                { icon: '🎯', text: '重点突破薄弱环节，巩固基础知识' },
                { icon: '😴', text: '保证每天7-8小时睡眠，不要熬夜' },
                { icon: '🏃', text: '适当运动，保持身体健康和良好心态' },
                { icon: '🍎', text: '饮食均衡，多吃蔬菜水果，少吃油腻' },
                { icon: '🧘', text: '考前深呼吸放松，保持平和心态' },
                { icon: '✍️', text: '多做模拟题，熟悉考试节奏' },
                { icon: '🎨', text: '学习环境可多用' + color.name + '，有助于提升运势' }
            ];
            
            document.getElementById('tipsList').innerHTML = tips.map(t => `
                <li class="tips-item">
                    <span class="tips-icon">${t.icon}</span>
                    <span class="tips-text">${t.text}</span>
                </li>
            `).join('');

            document.getElementById('loadingSection').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
        }

        function reset() {
            document.getElementById('resultSection').classList.add('hidden');
            document.getElementById('inputSection').classList.remove('hidden');
        }
    </script>
</body>
</html>
