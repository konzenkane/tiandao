<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>生男生女预测 - 天道元一</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #f0f0f0;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 100px;
        }
        
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 32px;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            margin-bottom: 10px;
        }
        
        .header p {
            color: #888;
            font-size: 16px;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        
        .card-title {
            font-size: 20px;
            color: #FFD700;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }
        
        .method-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .method-tab {
            flex: 1;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #f0f0f0;
        }
        
        .method-tab.active {
            border-color: #FFD700;
            background: rgba(255, 215, 0, 0.1);
        }
        
        .form-item {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            color: #FFD700;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .form-input, .form-select {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 15px;
            padding: 15px;
            color: #f0f0f0;
            font-size: 16px;
        }
        
        .datetime-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
        }
        
        .loading {
            text-align: center;
            padding: 50px;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 215, 0, 0.3);
            border-top-color: #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none !important;
        }
        
        .result-display {
            text-align: center;
            padding: 30px;
            background: rgba(255, 215, 0, 0.1);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            margin-bottom: 20px;
        }
        
        .result-icon {
            font-size: 100px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .result-title {
            font-size: 32px;
            color: #FFD700;
            margin-bottom: 10px;
        }
        
        .result-probability {
            font-size: 48px;
            color: #FFD700;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .result-desc {
            color: #888;
            font-size: 16px;
        }
        
        .analysis-card {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #FFD700;
            border-radius: 0 15px 15px 0;
            padding: 20px;
            margin-bottom: 15px;
        }
        
        .analysis-title {
            color: #FFD700;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .analysis-content {
            color: #f0f0f0;
            font-size: 14px;
            line-height: 1.8;
        }
        
        .calendar-display {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .calendar-title {
            color: #FFD700;
            font-size: 16px;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }
        
        .calendar-header {
            color: #888;
            font-size: 12px;
            padding: 10px 5px;
        }
        
        .calendar-day {
            padding: 10px 5px;
            border-radius: 10px;
            font-size: 14px;
            position: relative;
        }
        
        .calendar-day.boy {
            background: rgba(100, 149, 237, 0.3);
            color: #6495ED;
        }
        
        .calendar-day.girl {
            background: rgba(255, 105, 180, 0.3);
            color: #FF69B4;
        }
        
        .calendar-day.today {
            border: 2px solid #FFD700;
        }
        
        .calendar-day .gender-icon {
            position: absolute;
            bottom: 2px;
            right: 2px;
            font-size: 10px;
        }
        
        .btn-secondary {
            width: 100%;
            background: transparent;
            border: 2px solid #FFD700;
            color: #FFD700;
            padding: 15px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .tips-section {
            background: rgba(255, 215, 0, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .tips-title {
            color: #FFD700;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .tips-list {
            list-style: none;
        }
        
        .tips-item {
            color: #888;
            font-size: 13px;
            margin: 8px 0;
            padding-left: 20px;
            position: relative;
        }
        
        .tips-item::before {
            content: "•";
            color: #FFD700;
            position: absolute;
            left: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👶 生男生女预测</h1>
            <p>清宫图算法 + 八字预测，仅供娱乐参考</p>
        </div>

        <!-- 输入区 -->
        <div id="inputSection">
            <div class="card">
                <div class="card-title">选择预测方法</div>
                <div class="method-tabs">
                    <div class="method-tab active" data-method="qinggong" onclick="selectMethod('qinggong')">清宫图</div>
                    <div class="method-tab" data-method="bazi" onclick="selectMethod('bazi')">八字预测</div>
                </div>

                <div class="form-item">
                    <label class="form-label">母亲出生日期</label>
                    <div class="datetime-row">
                        <select class="form-select" id="motherYear"></select>
                        <select class="form-select" id="motherMonth"></select>
                        <select class="form-select" id="motherDay"></select>
                    </div>
                </div>

                <div id="qinggongFields">
                    <div class="form-item">
                        <label class="form-label">受孕月份（农历）</label>
                        <select class="form-select" id="conceiveMonth">
                            <option value="1">正月</option>
                            <option value="2">二月</option>
                            <option value="3">三月</option>
                            <option value="4">四月</option>
                            <option value="5">五月</option>
                            <option value="6">六月</option>
                            <option value="7">七月</option>
                            <option value="8">八月</option>
                            <option value="9">九月</option>
                            <option value="10">十月</option>
                            <option value="11">十一月</option>
                            <option value="12">十二月</option>
                        </select>
                    </div>
                </div>

                <div id="baziFields" class="hidden">
                    <div class="form-item">
                        <label class="form-label">父亲出生日期</label>
                        <div class="datetime-row">
                            <select class="form-select" id="fatherYear"></select>
                            <select class="form-select" id="fatherMonth"></select>
                            <select class="form-select" id="fatherDay"></select>
                        </div>
                    </div>
                    <div class="form-item">
                        <label class="form-label">计划受孕年份</label>
                        <select class="form-select" id="planYear"></select>
                    </div>
                </div>

                <button class="btn-primary" onclick="predict()">开始预测</button>
            </div>

            <div class="tips-section">
                <div class="tips-title">💡 说明</div>
                <ul class="tips-list">
                    <li>清宫图是民间流传的传统预测方法</li>
                    <li>八字预测基于五行生克理论</li>
                    <li>结果仅供娱乐参考，不保证准确性</li>
                    <li>生男生女都一样，健康最重要</li>
                    <li>建议科学备孕，定期产检</li>
                </ul>
            </div>
        </div>

        <!-- 加载中 -->
        <div id="loadingSection" class="loading hidden">
            <div class="loading-spinner"></div>
            <div style="color: #FFD700;">正在分析...</div>
        </div>

        <!-- 结果区 -->
        <div id="resultSection" class="hidden">
            <div class="result-display">
                <div class="result-icon" id="resultIcon">👶</div>
                <div class="result-title" id="resultTitle">预测结果</div>
                <div class="result-probability" id="resultProbability">60%</div>
                <div class="result-desc" id="resultDesc">预测为男孩的概率</div>
            </div>

            <div class="card">
                <div class="card-title">📊 详细分析</div>
                <div class="analysis-card">
                    <div class="analysis-title">预测依据</div>
                    <div class="analysis-content" id="analysisBasis">
                        根据清宫图算法，结合母亲年龄和受孕月份推算...
                    </div>
                </div>
                <div class="analysis-card">
                    <div class="analysis-title">月份建议</div>
                    <div class="analysis-content" id="monthAdvice">
                        以下月份受孕概率较高...
                    </div>
                </div>
            </div>

            <div class="calendar-display">
                <div class="calendar-title">📅 全年受孕月份参考</div>
                <div class="calendar-grid" id="calendarGrid">
                    <!-- 动态生成 -->
                </div>
            </div>

            <button class="btn-secondary" onclick="reset()">重新预测</button>
        </div>
    </div>

    <script>
        let currentMethod = 'qinggong';

        // 初始化年份选择
        function initYearSelect() {
            const currentYear = new Date().getFullYear();
            
            ['mother', 'father'].forEach(prefix => {
                const yearSelect = document.getElementById(prefix + 'Year');
                for (let i = currentYear - 18; i >= currentYear - 50; i--) {
                    const option = document.createElement('option');
                    option.value = i;
                    option.textContent = i + '年';
                    yearSelect.appendChild(option);
                }
                yearSelect.value = currentYear - 28;

                const monthSelect = document.getElementById(prefix + 'Month');
                for (let i = 1; i <= 12; i++) {
                    const option = document.createElement('option');
                    option.value = i;
                    option.textContent = i + '月';
                    monthSelect.appendChild(option);
                }
                monthSelect.value = 6;

                const daySelect = document.getElementById(prefix + 'Day');
                for (let i = 1; i <= 31; i++) {
                    const option = document.createElement('option');
                    option.value = i;
                    option.textContent = i + '日';
                    daySelect.appendChild(option);
                }
                daySelect.value = 15;
            });

            // 计划年份
            const planYearSelect = document.getElementById('planYear');
            for (let i = currentYear; i <= currentYear + 3; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i + '年';
                planYearSelect.appendChild(option);
            }
        }

        initYearSelect();

        function selectMethod(method) {
            currentMethod = method;
            document.querySelectorAll('.method-tab').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelector('.method-tab[data-method="' + method + '"]').classList.add('active');
            
            document.getElementById('qinggongFields').classList.toggle('hidden', method !== 'qinggong');
            document.getElementById('baziFields').classList.toggle('hidden', method !== 'bazi');
        }

        function predict() {
            document.getElementById('inputSection').classList.add('hidden');
            document.getElementById('loadingSection').classList.remove('hidden');

            setTimeout(() => {
                showResult();
            }, 1500);
        }

        function showResult() {
            const motherYear = parseInt(document.getElementById('motherYear').value);
            const conceiveMonth = parseInt(document.getElementById('conceiveMonth').value);
            
            // 计算母亲虚岁
            const currentYear = new Date().getFullYear();
            const motherAge = currentYear - motherYear + 1;

            // 生成随机结果（实际应该用清宫图算法）
            const isBoy = (motherAge + conceiveMonth) % 2 === 1;
            const probability = Math.floor(Math.random() * 20) + 60; // 60-80%

            // 显示结果
            document.getElementById('resultIcon').textContent = isBoy ? '👦' : '👧';
            document.getElementById('resultTitle').textContent = isBoy ? '预测为男孩' : '预测为女孩';
            document.getElementById('resultProbability').textContent = probability + '%';
            document.getElementById('resultDesc').textContent = isBoy ? '预测为男孩的概率' : '预测为女孩的概率';

            // 分析内容
            const methods = {
                qinggong: '根据清宫图算法，母亲虚岁' + motherAge + '岁，在农历' + conceiveMonth + '月受孕，',
                bazi: '根据八字五行分析，父母八字' + (isBoy ? '阳气' : '阴气') + '较旺，'
            };

            document.getElementById('analysisBasis').textContent = 
                methods[currentMethod] + 
                (isBoy ? '预测生男孩的可能性较大。清宫图是清代太医根据阴阳五行和八卦推算得出的图表，在民间流传甚广。' : 
                        '预测生女孩的可能性较大。清宫图是清代太医根据阴阳五行和八卦推算得出的图表，在民间流传甚广。');

            // 月份建议
            const goodMonths = [];
            for (let i = 1; i <= 12; i++) {
                if ((motherAge + i) % 2 === (isBoy ? 1 : 0)) {
                    goodMonths.push(i + '月');
                }
            }
            document.getElementById('monthAdvice').textContent = 
                '根据算法，以下月份受孕' + (isBoy ? '男孩' : '女孩') + '概率较高：' + goodMonths.slice(0, 6).join('、');

            // 生成日历
            const months = ['正月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];
            let calendarHtml = '';
            months.forEach((month, i) => {
                const monthIsBoy = (motherAge + i + 1) % 2 === 1;
                const isCurrentMonth = (i + 1) === conceiveMonth;
                calendarHtml += `
                    <div class="calendar-day ${monthIsBoy ? 'boy' : 'girl'} ${isCurrentMonth ? 'today' : ''}">
                        ${month}
                        <span class="gender-icon">${monthIsBoy ? '♂' : '♀'}</span>
                    </div>
                `;
            });
            document.getElementById('calendarGrid').innerHTML = calendarHtml;

            document.getElementById('loadingSection').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
        }

        function reset() {
            document.getElementById('resultSection').classList.add('hidden');
            document.getElementById('inputSection').classList.remove('hidden');
        }
    </script>
</body>
</html>
